name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read

jobs:
  validate:
    name: Typecheck, tests, and coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Run tests with coverage
        run: bun run coverage

  sbom:
    name: SBOM
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: validate
    uses: acdgbrasil/.github/.github/workflows/reusable-sbom.yml@main
    permissions:
      contents: write

  kodus-review:
    name: Kodus AI Review
    if: github.event_name == 'pull_request'
    uses: acdgbrasil/.github/.github/workflows/reusable-kodus-review.yml@main
    with:
      fail_on: critical
    secrets:
      KODUS_TEAM_KEY: ${{ secrets.KODUS_TEAM_KEY }}
